- name: Configure EnviroTrack application host
  hosts: all
  become: true
  collections:
    - community.docker
  vars:
    app_image: "{{ app_image | default('envirotrack-api:latest') }}"
    zabbix_server_ip: "{{ zabbix_server_ip | default('127.0.0.1') }}"

  tasks:
    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install base packages
      apt:
        name:
          - docker.io
          - python3-docker
          - python3-pip
          - curl
        state: present

    - name: Ensure Docker is running
      service:
        name: docker
        state: started
        enabled: true

    - name: Install Zabbix agent
      apt:
        name: zabbix-agent
        state: present

    - name: Configure Zabbix server address
      lineinfile:
        path: /etc/zabbix/zabbix_agentd.conf
        regexp: "^Server="
        line: "Server={{ zabbix_server_ip }}"

    - name: Restart Zabbix agent
      service:
        name: zabbix-agent
        state: restarted
        enabled: true

    - name: Pull latest application image
      community.docker.docker_image:
        name: "{{ app_image }}"
        source: pull

    - name: Run application container
      community.docker.docker_container:
        name: envirotrack-api
        image: "{{ app_image }}"
        pull: true
        restart_policy: unless-stopped
        published_ports:
          - "8000:8000"
        state: started
